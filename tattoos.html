<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mervin Carballo — Tattoos Gallery | San Diego</title>
  <meta name="description" content="Sacred Geometry tattoo gallery by Mervin Carballo. View recent work from San Diego, California.">
  <link rel="canonical" href="https://eternowebstudio.com/vedic_electric/tattoos.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--black:#06030f;--charcoal:#0e0a1a;--violet:#9D4EDD;--violet-bright:#b06aee;--violet-dim:rgba(157,78,221,0.4);--violet-glow:rgba(157,78,221,0.15);--white:#f0ecff;--dim:#7a7090;--border:rgba(157,78,221,0.12)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 60px;background:rgba(6,3,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .nav-logo{font-family:'Cinzel',Georgia,serif;font-size:1rem;font-weight:500;letter-spacing:0.18em;color:var(--white);text-decoration:none;text-transform:uppercase}
    .nav-links{display:flex;gap:36px;list-style:none;align-items:center}
    .nav-links a{color:var(--dim);text-decoration:none;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;transition:color 0.25s}
    .nav-links a:hover,.nav-links a.active{color:var(--violet-bright)}
    .lang-toggle{background:none;border:1px solid var(--border);color:var(--dim);font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;padding:6px 14px;cursor:pointer;transition:all 0.25s;font-family:'DM Sans',sans-serif}
    .lang-toggle:hover{border-color:var(--violet);color:var(--violet-bright)}
    .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
    .hamburger span{display:block;width:22px;height:1px;background:var(--white);margin:5px 0;transition:all 0.3s}
    .mobile-menu{display:none;position:fixed;top:65px;left:0;right:0;z-index:99;background:rgba(14,10,26,0.98);padding:24px 60px;border-bottom:1px solid var(--border)}
    .mobile-menu.open{display:block}
    .mobile-menu a{display:block;color:var(--white);text-decoration:none;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;padding:12px 0;border-bottom:1px solid var(--border)}
    .book-float{position:fixed;bottom:36px;right:36px;z-index:200;background:var(--violet);color:#000;font-family:'DM Sans',sans-serif;font-size:0.68rem;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;text-decoration:none;padding:14px 24px;border-radius:2px;box-shadow:0 0 30px var(--violet-dim),0 4px 16px rgba(0,0,0,0.4);transition:all 0.3s}
    .book-float:hover{transform:translateY(-3px);box-shadow:0 0 50px var(--violet-dim),0 8px 24px rgba(0,0,0,0.5);background:var(--violet-bright)}
    .fade-up{opacity:0;transform:translateY(28px);transition:opacity 0.8s ease,transform 0.8s ease}
    .fade-up.visible{opacity:1;transform:translateY(0)}
    footer{background:var(--charcoal);padding:48px 72px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .footer-logo{font-family:'Cinzel',Georgia,serif;font-size:0.95rem;color:var(--dim);letter-spacing:0.12em}
    .footer-links{display:flex;gap:28px}
    .footer-links a{color:var(--dim);text-decoration:none;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;transition:color 0.2s}
    .footer-links a:hover{color:var(--violet-bright)}
    .footer-copy{color:var(--dim);font-size:0.68rem}
    .section-label{font-family:'DM Sans',sans-serif;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--violet);margin-bottom:16px;opacity:0.85}
    h1{font-family:'Cinzel',Georgia,serif;font-size:clamp(3rem,6vw,5rem);font-weight:400;line-height:1;letter-spacing:0.03em;background:linear-gradient(135deg,#f0ecff 0%,#c4a8e8 50%,#f0ecff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
    .page-hero{min-height:50vh;display:flex;align-items:center;padding:120px 80px 80px;position:relative;overflow:hidden}
    .page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 80% at 50% 0%,rgba(60,20,100,0.4) 0%,transparent 70%)}
    .page-hero-content{position:relative;z-index:2;max-width:700px}
    .gallery-section{padding:0 60px 96px;max-width:1400px;margin:0 auto}
    .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:48px}
    .gallery-item{aspect-ratio:1;overflow:hidden;cursor:pointer}
    .gallery-item img{width:100%;height:100%;object-fit:cover;filter:brightness(0.8)saturate(0.85);transition:all 0.5s;display:block}
    .gallery-item:hover img{filter:brightness(1)saturate(1.05);transform:scale(1.06)}
    .gallery-cta{text-align:center;padding-top:32px}
    .btn-outline{display:inline-block;border:1px solid var(--border);color:var(--white);text-decoration:none;font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;padding:14px 36px;font-family:'DM Sans',sans-serif;transition:all 0.3s}
    .btn-outline:hover{border-color:var(--violet);color:var(--violet-bright);box-shadow:0 0 20px var(--violet-glow)}
    /* LIGHTBOX */
    #lightbox-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(6,3,15,0.97);align-items:center;justify-content:center;cursor:zoom-out}
    #lightbox-overlay.active{display:flex}
    #lb-img{max-width:92vw;max-height:92vh;object-fit:contain;transition:opacity 0.2s}
    #lb-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:2.2rem;cursor:pointer;z-index:10001;line-height:1;padding:8px}
    #lb-prev,#lb-next{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;z-index:10001;padding:12px;opacity:0.7}
    #lb-prev{left:16px}
    #lb-next{right:16px}
    @media(max-width:900px){nav{padding:18px 24px}.nav-links{display:none}.hamburger{display:block}footer{flex-direction:column;gap:24px;padding:40px 24px;text-align:center}.page-hero{padding:100px 24px 60px}.gallery-section{padding:0 24px 60px}.gallery-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.gallery-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>

  <script>
    const LANG={default:'en',current:document.documentElement.lang||'en'};
    function toggleLang(){LANG.current=LANG.current==='es'?'en':'es';document.documentElement.lang=LANG.current;document.querySelectorAll('[data-es][data-en]').forEach(el=>{el.textContent=el.getAttribute('data-'+LANG.current)||el.textContent});const btn=document.querySelector('.lang-toggle');if(btn)btn.textContent=LANG.current==='es'?'EN':'ES'}
    document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('[data-es][data-en]').forEach(el=>{el.textContent=el.getAttribute('data-'+LANG.current)||el.textContent})});
    const obs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:0.1});
    document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));
    // Lightbox
    var lbOverlay=document.getElementById('lightbox-overlay'),lbImg=document.getElementById('lb-img'),lbImages=[],lbIdx=0;
    document.querySelectorAll('.gallery-item img').forEach(function(img,i){lbImages.push(img.src);img.style.cursor='zoom-in';img.addEventListener('click',function(e){e.preventDefault();openLightbox(i)})});
    function openLightbox(i){lbIdx=i;lbImg.src=lbImages[lbIdx];lbOverlay.classList.add('active');document.body.style.overflow='hidden'}
    function closeLightbox(){lbOverlay.classList.remove('active');document.body.style.overflow=''}
    function lbNav(d){lbIdx=(lbIdx+d+lbImages.length)%lbImages.length;lbImg.src=lbImages[lbIdx]}
    window.closeLightbox=closeLightbox;window.lbNav=lbNav;
    document.addEventListener('keydown',function(e){if(lbOverlay.classList.contains('active')){if(e.key==='Escape')closeLightbox();else if(e.key==='ArrowLeft')lbNav(-1);else if(e.key==='ArrowRight')lbNav(1)}});
    lbOverlay.addEventListener('click',function(e){if(e.target===lbOverlay)closeLightbox()});
  </script>
